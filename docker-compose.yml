services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: meshtrove
      POSTGRES_PASSWORD: meshtrove
      POSTGRES_DB: meshtrove
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - meshtrove-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshtrove"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  meshtrove-pgdata:
