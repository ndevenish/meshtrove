name: Build and push Docker image

# Builds the container image and pushes it to the GitHub Container Registry
# (ghcr.io/<owner>/<repo>). Each platform is built on its own native runner and
# pushed by digest; a final job stitches the digests into one multi-arch
# manifest, so the published tag works on every built architecture.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# One build per ref; a newer push to main supersedes an in-flight one. Tag
# builds are never cancelled — each release must produce its own image.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

env:
  # ghcr.io/ndevenish/meshtrove — github.repository is already lowercased for
  # this repo, which the registry requires.
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
          # Uncomment to also build x86_64. It builds natively on the standard
          # runner and is merged into the same multi-arch tag automatically.
          # - platform: linux/amd64
          #   runner: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare platform slug
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        # Full history and tags: `git describe` needs the tags to name a version,
        # and the commit count back to the nearest one. The default shallow
        # single-commit fetch can produce neither.
        with:
          fetch-depth: 0

      # A bare `github.sha` told you nothing about which release a main build came
      # after. Describe names the nearest tag and the distance from it
      # (v1.0-52-gebc55f2), which the consumers normalize to v1.0.52-gebc55f2.
      # `--long` keeps the count even at zero, so a release build stamps
      # v1.0.0-g50f57fe rather than a bare v1.0 — one shape for every build.
      - name: Derive version
        run: echo "APP_VERSION=$(git describe --tags --always --long)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
          # Push by digest only; the merge job attaches the human tags.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge and push manifest
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # `type=ref,event=tag` publishes the git tag verbatim and is what makes
          # a release land under a name you can pin. The semver patterns below it
          # only fire for a three-component tag — metadata-action rejects
          # anything shorter ("v1.0 is not a valid semver") and silently drops
          # them, which left the v1.0 release published as nothing but its sha.
          #
          # `latest` follows the tip of main — every commit moves it, so it is a
          # rolling build rather than the newest release — and a release or a
          # manual dispatch moves it too. Pin to a version or a sha tag to hold
          # still.
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}

      # Poke the deployment to pull the image just published. This runs only after
      # the manifest above is live, so :latest is guaranteed complete before the
      # host is told to update. The endpoint is a Watchtower /v1/update behind a
      # Cloudflare tunnel; the Bearer token is Watchtower's, and the CF-Access-*
      # headers satisfy a Cloudflare Access service-token policy in front of it.
      # See docs/deploy.md → "Automatic redeploy on a new image".
      #
      # The whole step is skipped unless DEPLOY_WEBHOOK_URL is configured, so
      # forks and anyone without an auto-updating deployment build as before.
      - name: Trigger production redeploy
        env:
          # URL is a repository *variable* (not secret) — the hostname isn't
          # sensitive, and the CF Access + Bearer checks are what gate the call.
          DEPLOY_WEBHOOK_URL: ${{ vars.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        if: env.DEPLOY_WEBHOOK_URL != ''
        run: |
          curl -fsS --retry 3 --retry-delay 5 --max-time 60 -X POST \
            -H "Authorization: Bearer ${DEPLOY_WEBHOOK_TOKEN}" \
            -H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
            "${DEPLOY_WEBHOOK_URL}"
