# Production deployment: Postgres + the MeshTrove app, both persisted to named
# volumes. This is separate from docker-compose.yml (dev, Postgres only).
# The app runs the prebuilt ghcr.io/ndevenish/meshtrove:latest image, re-pulled
# on every `up`.
#
#   cp .env.prod.example .env.prod    # then fill it in
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
#
# See docs/deploy.md for the full walkthrough.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: meshtrove
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: meshtrove
    volumes:
      # Named volume by default. To back this with a ZFS dataset instead, replace
      # with a bind mount onto the dataset mountpoint (see docs/deploy.md):
      #   - /srv/meshtrove/pgdata:/var/lib/postgresql/data
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshtrove"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    image: ghcr.io/ndevenish/meshtrove:latest
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    # The image runs as its own uid (10001) by default. When the store is bind-
    # mounted onto a host dataset (e.g. ZFS owned 1000:1000), run the container as
    # that owner so it can write — otherwise you get "Permission denied (os error
    # 13)". Set MESHTROVE_UID/GID in .env.prod to match the dataset's owner.
    user: "${MESHTROVE_UID:-10001}:${MESHTROVE_GID:-10001}"
    environment:
      # The app applies migrations itself at startup (sqlx::migrate!).
      DATABASE_URL: postgres://meshtrove:${POSTGRES_PASSWORD}@postgres:5432/meshtrove
      # REQUIRED: signing key for session cookies. Sessions are invalidated if it
      # changes, so keep it stable. Generate: openssl rand -base64 64 | tr -d '\n'
      MESHTROVE_COOKIE_KEY: ${MESHTROVE_COOKIE_KEY:?set MESHTROVE_COOKIE_KEY in .env.prod (openssl rand -base64 64 | tr -d '\n')}
      # Optional: bootstrap an admin on first start (username:password). Empty = skip.
      MESHTROVE_CREATE_ADMIN: ${MESHTROVE_CREATE_ADMIN:-}
      MESHTROVE_BIND_ADDR: 0.0.0.0:3000
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${MESHTROVE_PORT:-3000}:3000"
    volumes:
      # Named volume by default. To back this with a ZFS dataset instead, replace
      # with a bind mount onto the dataset mountpoint (see docs/deploy.md):
      #   - /srv/meshtrove/store:/app/store
      - store:/app/store
    labels:
      # Marks this container as the one Watchtower may update (below). Postgres is
      # deliberately left unlabelled so an auto-update never touches the database.
      com.centurylinklabs.watchtower.enable: "true"
    restart: unless-stopped

  # Optional: webhook-driven redeploy. Watchtower pulls the newest image and
  # recreates `app` with the same config when it receives an authenticated
  # POST /v1/update — nothing else. Enabling the update API disables Watchtower's
  # periodic scan, so it acts ONLY on that trigger, which the CI workflow sends
  # after publishing a new :latest. See docs/deploy.md → "Automatic redeploy on a
  # new image". Drop this service if you'd rather redeploy by hand.
  watchtower:
    # Pinned to the v1 major on purpose: the update API is enabled below via
    # WATCHTOWER_HTTP_API_UPDATE, which the fork deprecates for removal in v2, so
    # :latest would eventually silently break this. Bump deliberately at v2 and
    # switch to the --http-api-endpoints option then.
    image: nickfedor/watchtower:1 # maintained fork of containrrr/watchtower
    depends_on:
      - app
    volumes:
      # Watchtower drives the Docker daemon to pull + recreate the container.
      - /var/run/docker.sock:/var/run/docker.sock
      # If the GHCR package is private, Watchtower needs registry credentials to
      # pull it — the host daemon's own `docker login` is NOT visible in here.
      # Uncomment and point at the docker config of whoever ran `docker login
      # ghcr.io`; it must hold an embedded token (auths→ghcr.io→auth), not a
      # credsStore/credHelper reference. Or make the package public — see
      # docs/deploy.md → "Registry credentials".
      #- /root/.docker/config.json:/config.json:ro
    environment:
      # Enable the HTTP update endpoint (POST /v1/update, guarded by the token).
      # This is the flag the released image (v1.x) understands; the newer
      # --http-api-endpoints option is docs-only until a future release.
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN:?set WATCHTOWER_TOKEN in .env.prod}
      # Only touch containers carrying the enable label above (i.e. just `app`).
      WATCHTOWER_LABEL_ENABLE: "true"
      # Delete the superseded image after a successful update.
      WATCHTOWER_CLEANUP: "true"
    # Watchtower listens on 8080, deliberately NOT published to the host. Your
    # Cloudflare tunnel reaches it by service name (http://watchtower:8080) by
    # sharing a Docker network with cloudflared — see docs/deploy.md. Do not
    # expose this port to the public internet directly.
    expose:
      - "8080"
    restart: unless-stopped

volumes:
  pgdata:
  store:
