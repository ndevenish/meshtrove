# Install once with `pre-commit install`. The formatting hooks rewrite files in
# place, so a failed run usually just means re-staging what they fixed.
#
# The sqlx hook needs postgres up (`docker compose up -d`) and migrated — the
# same requirement as building the backend at all, since the query! macros are
# checked against a live database. It is what keeps backend/.sqlx honest: the
# release image builds with SQLX_OFFLINE=true against that committed cache, so a
# stale cache is not discovered until a `v*` tag is already cut.

# backend/.sqlx is generated by sqlx-cli and must stay byte-identical to what it
# writes; frontend/public holds design exports that ship as-is.
exclude: '^(backend/\.sqlx/|frontend/public/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      # Not per-file: rustfmt handed bare paths ignores the crate's edition and
      # reformats 2024 code to 2015 rules. --all reads it from Cargo.toml.
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path backend/Cargo.toml --all
        language: system
        files: ^backend/.*\.rs$
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: frontend/node_modules/.bin/prettier --write
        language: system
        files: ^frontend/
        types_or: [ts, tsx, javascript, jsx, json, css, html, markdown]

      - id: sqlx-prepare
        name: sqlx prepare --check
        entry: bash -c 'cd backend && exec cargo sqlx prepare --check -- --all-targets'
        language: system
        files: ^backend/(src/.*\.rs|migrations/.*\.sql)$
        pass_filenames: false
